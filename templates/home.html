<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .login{
            background:#fff;
            width:100%;
            max-width:650px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .login h1{
            text-align:center;
            color:#333;
            margin-bottom:20px;
        }

        legend{
            font-size:22px;
            font-weight:bold;
            color:#29323a;
            margin-bottom:20px;
            text-align:center;
        }

        .mb-3{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#555;
            font-weight:bold;
        }

        .form-control{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            transition:0.3s;
        }

        .form-control:focus{
            border-color:#4facfe;
            outline:none;
            box-shadow:0 0 8px rgba(79,172,254,0.5);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#008CFF;
            transform:scale(1.02);
        }

        h2{
            margin-top:25px;
            text-align:center;
            color:#222;
            background:#e8f5e9;
            padding:15px;
            border-radius:8px;
        }

        @media(max-width:600px){
            .login{
                padding:20px;
            }

            .login h1{
                font-size:24px;
            }

            legend{
                font-size:18px;
            }
        }
    </style>
</head>

<body>

<div class="login">

    <h1>🎓 Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <legend>Student Exam Performance Prediction</legend>

        <div class="mb-3">
            <label>Gender</label>
            <select class="form-control" name="gender" required>
                <option selected disabled value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" required>
                <option selected disabled value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education" required>
                <option selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">Free/Reduced</option>
                <option value="standard">Standard</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Test Preparation Course</label>
            <select class="form-control" name="test_preparation_course" required>
                <option selected disabled value="">Select Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Reading Score (0-100)</label>
            <input
                class="form-control"
                type="number"
                name="reading_score"
                placeholder="Enter Reading Score"
                min="0"
                max="100"
                required>
        </div>

        <div class="mb-3">
            <label>Writing Score (0-100)</label>
            <input
                class="form-control"
                type="number"
                name="writing_score"
                placeholder="Enter Writing Score"
                min="0"
                max="100"
                required>
        </div>

        <div class="mb-3">
            <input class="btn" type="submit" value="Predict Maths Score">
        </div>

    </form>

    {% if results %}
    <h2>📊 Predicted Maths Score: {{ results }}</h2>
    {% endif %}

</div>

</body>
</html>
